<!doctype html>
<html lang="en">

    <!-- Primary SEO Meta Tags -->

    <!-- Favicon -->
    <link rel="icon" href="/static/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/logo.png">
    
    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "n4mint",
      "url": "https://n4mint.com",
      "logo": "https://n4mint.com/static/logo.png",
      "description": "AI-powered audio and video transcription platform with intelligent processing",
      "sameAs": [
        "https://twitter.com/n4mint",
        "https://github.com/el-apuesto/informant"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@n4mint.com"
      }
    }
    </script>
    
    <!-- Structured Data - Software Application -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "n4mint",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "150"
      },
      "featureList": "AI transcription, automatic cleaning, content summarization, viral clip generation, speaker diarization"
    }
    </script>
    
    <!-- Structured Data - FAQ Page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is n4mint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "n4mint is an AI-powered platform that transforms audio and video files into clean, actionable text. It offers transcription, automatic cleaning, summarization, and viral clip generation."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the transcription?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "n4mint uses state-of-the-art AI models including OpenAI Whisper for transcription and Groq-powered Llama models for cleaning and summarization, achieving industry-leading accuracy rates."
          }
        },
        {
          "@type": "Question",
          "name": "Is there a free plan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! n4mint offers a free tier to get started. Premium plans with additional features and higher processing limits are available starting at $12/month."
          }
        }
      ]
    }
    </script>
