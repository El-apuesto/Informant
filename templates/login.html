<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="/static/images/favicon.png">
    <link rel="apple-touch-icon" href="/static/images/apple-touch-icon.png">
    <title>Audio Transcription - Login</title>
    <style>
        :root {
            --primary-glow: radial-gradient(circle at 50% -20%, #8998ff, rgba(255, 255, 255, 0));
            --secondary-glow: radial-gradient(circle at 50% 120%, #b879f8, rgba(255, 255, 255, 0));
            --brand-gradient: linear-gradient(90deg, #8998ff, #b879f8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d0c1d;
            background-image: url('/static/images/login-background.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-card {
            background: rgba(13, 12, 29, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.4);
            animation: slideInUp 0.8s ease-out;
        }
        
        @keyframes slideInUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .login-card::before, .login-card::after {
            content: '';
            position: absolute;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .login-card::before {
            background-image: var(--primary-glow);
            top: 0;
            animation: glow-top 5s infinite alternate;
        }

        .login-card::after {
            background-image: var(--secondary-glow);
            bottom: 0;
            animation: glow-bottom 5s infinite alternate;
        }

        @keyframes glow-top {
            from { transform: translateY(-60%); opacity: 0.5; }
            to { transform: translateY(-80%); opacity: 0.8; }
        }

        @keyframes glow-bottom {
            from { transform: translateY(60%); opacity: 0.5; }
            to { transform: translateY(80%); opacity: 0.8; }
        }

        .logo {
            width: 70px;
            height: 70px;
            background: var(--brand-gradient);
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(137, 152, 255, 0.4);
            transform: rotate(-10deg);
            transition: transform 0.3s ease;
        }

        .login-card:hover .logo {
            transform: rotate(0deg);
        }

        .logo svg {
            width: 60%;
            height: 60%;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #8998ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(137, 152, 255, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--brand-gradient);
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(137, 152, 255, 0.4);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 15px rgba(137, 152, 255, 0.4);
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash {
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 10px;
            border: 1px solid;
            background-color: rgba(255,255,255,0.1);
        }

        .flash.error {
            border-color: rgba(255, 107, 107, 0.5);
            color: #ff8f8f;
        }

        .flash.success {
            border-color: rgba(46, 204, 113, 0.5);
            color: #63ff9e;
        }

        .flash.info {
            border-color: rgba(52, 152, 219, 0.5);
            color: #72c2ff;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <img src="/static/images/logo.png" alt="Logo">
        </div>
        
        <h1>Audio Transcription</h1>
        <p class="subtitle">Sign up or login to start transcribing</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit">Sign Up / Login</button>
        </form>
    </div>
</body>
</html>
